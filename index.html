<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="calc">
        <div class="calculator-body">
            <h3>advanced precision</h3>
            <div class="resultbox">
                <div class="result" id="result">0</div>
            </div>
            <div class="btns">
                <div class="btn-row-1">
                    <button class="btn" id="clear" onclick="clearResult()">Clear</button>
                    <button class="btn" id="divide" onclick="appendOperator('/')">/</button>
                    <button class="btn" id="multiply" onclick="appendOperator('*')">*</button>
                </div>

                <div class="btn-row-middle">
                    <button class="btn" id="seven" onclick="appendNumber('7')">7</button>
                    <button class="btn" id="eight" onclick="appendNumber('8')">8</button>
                    <button class="btn" id="nine" onclick="appendNumber('9')">9</button>
                    <button class="btn" id="subtract" onclick="appendOperator('-')">-</button>
                    <button class="btn" id="four" onclick="appendNumber('4')">4</button>
                    <button class="btn" id="five" onclick="appendNumber('5')">5</button>
                    <button class="btn" id="six" onclick="appendNumber('6')">6</button>
                    <button class="btn" id="add" onclick="appendOperator('+')">+</button>
                    <button class="btn" id="one" onclick="appendNumber('1')">1</button>
                    <button class="btn" id="two" onclick="appendNumber('2')">2</button>
                    <button class="btn" id="three" onclick="appendNumber('3')">3</button>
                    <button class="btn" id="point" onclick="appendDecimal()">.</button>
                </div>

                <div class="btn-row-end">
                    <button class="btn" id="zero" onclick="appendNumber('0')">0</button>
                    <button class="btn" id="equal" onclick="calculate()">=</button>
                </div>
            </div>
        </div>
    </section>
</body>

<script src="script.js"></script>

</html>
